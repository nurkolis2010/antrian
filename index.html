<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sistem Antrean SPMB SMKN 2 Purwodadi</title>
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f0f7ff; }
    iframe { border: none; width: 100%; height: 100%; display: none; }
    
    /* Animasi Loading Spinner Elegan */
    .loader-container {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 999; font-family: sans-serif; color: #0284c7;
    }
    .spinner {
      width: 50px; height: 50px;
      border: 5px solid #bae6fd; border-top: 5px solid #0284c7;
      border-radius: 50%; animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="loader" class="loader-container">
    <div class="spinner"></div>
    <p style="font-weight: bold; font-size: 14px;">Menghubungkan ke Server Antrean...</p>
  </div>

  <!-- Ganti src dengan URL Deploy Web App Apps Script Anda -->
  <iframe id="appIframe" src="https://script.google.com/macros/s/AKfycbwLOHh5AdMWqCZh2oNeqTZXW2gSc68KPDm7c0iSrS-52Z5EFGWD8c1pUPoiEAcNTz07/exec" onload="hideLoader()"></iframe>

  <script>
    function hideLoader() {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('appIframe').style.display = 'block';
    }
  </script>
</body>
</html>
